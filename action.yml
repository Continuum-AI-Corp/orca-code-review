# Orca-Code-Review — reusable composite action.
#
# Consumers reference this with `uses:` instead of copying the folder; see
# workflows/orca-code-review.yml for the ~15-line example workflow.
#
# Single-tier review (gpt-5.5): one review pass per run. The cheap->strong
# cascade was retired after testing showed the cheap tier added no value online
# — it fails closed on large diffs and otherwise just escalates anyway, taxing
# every PR with latency for no decision. Size-based front routing (small->cheap,
# large->strong, decided up front) is a planned later optimization and is also
# single-pass, so this design stays forward-compatible. Findings post as inline
# PR comments and a severity gate can fail the check to block the merge.
#
# Model selection is NOT hardcoded here. The action emits raw facts
# (x-cr-prev-tier / x-cr-prev-p0p1); it injects the strong-tier facts so the
# router picks the single model. OCR can't send custom headers, so an in-job
# loopback proxy (scripts/fact-proxy.mjs) stamps those facts onto OCR's
# requests; the workspace router's DSL recipe (recipes/code-review.dsl.yaml)
# maps them to the concrete model. The facts and rule shape are preserved so a
# future size-based front-routing policy can re-diverge without an Action change.
#
# Around the cascade: dashboard settings (scripts/settings.mjs, fetched
# fail-open from the gateway; `settings: "false"` skips the fetch and makes
# the workflow file authoritative) gate auto reviews (auto_review / trigger),
# retune fix-first/block-on, and switch on quiet mode (P2 muted at posting via
# scripts/quiet-filter.mjs — the gate/report still see true counts), an
# exhaustive mode (extra engine passes on the strong tier only, deduped by
# scripts/exhaustive-merge.mjs), and a server-side rubric override; an
# oversized-diff guard (scripts/diff-guard.mjs) decides review/skip BEFORE the
# engine ever runs (a skip posts a notice and, by default, FAILS the check so
# the merge gate can't be padded around — `on-oversized-diff: "pass"` makes it
# advisory); one summary per PR (scripts/summary-comment.mjs) is written into
# a marker region of the PR description (scripts/inject-summary.mjs) so it stays
# pinned at the top, replaced in place on every push; and a best-effort per-tier run report
# (scripts/report.mjs) posts severity counts — never code — to the OrcaRouter
# control plane after the gate.

name: "Orca-Code-Review"
description: "AI PR review via the OrcaRouter gateway — cost-tiered cascade with a severity merge gate."
author: "OrcaRouter"

branding:
  icon: "git-pull-request"
  color: "blue"

inputs:
  orcarouter-api-key:
    description: "OrcaRouter API key."
    required: true
  orcarouter-url:
    description: "OrcaRouter chat-completions endpoint."
    required: false
    default: "https://api.orcarouter.ai/v1/chat/completions"
  github-token:
    description: "Token used to fetch the PR head, post review comments, and manage the tier label."
    required: false
    default: ${{ github.token }}
  brand:
    description: "Name shown on PR comments."
    required: false
    default: "Orca-Code-Review"
  router:
    description: >-
      OrcaRouter router alias (orcarouter/<name>) that owns model selection.
      The action names no models: it injects the cascade's raw facts
      (x-cr-prev-tier / x-cr-prev-p0p1) as headers and this router's DSL recipe
      maps them to the cheap/strong model. See recipes/code-review.dsl.yaml.
    required: false
    default: "orcarouter/code-review"
  fix-first:
    description: "Severities that withhold the strong tier until fixed at the cheap tier."
    required: false
    default: "P0,P1"
  block-on:
    description: "Severities that fail the check (block the merge)."
    required: false
    default: "P0,P1"
  auto-review-authors:
    description: >-
      Comma-separated GitHub author-association allowlist for AUTOMATIC
      reviews (pull_request events). Empty = review everyone (default). On a
      PUBLIC repo, pull_request_target bypasses GitHub's fork-approval gate
      and the review key is wallet-metered, so an external user can trigger
      paid cascades by opening PRs — set e.g.
      "OWNER,MEMBER,COLLABORATOR,CONTRIBUTOR" to auto-review only known
      contributors (others can still be reviewed on demand via
      /orca-code-review). Also set a wallet budget + alert on the key.
      Case-insensitive; values: OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR,
      FIRST_TIME_CONTRIBUTOR, FIRST_TIMER, MANNEQUIN, NONE.
    required: false
    default: ""
  max-diff-kb:
    description: >-
      Skip the review when the PR's merge-base diff is bigger than this many
      KB. A skip posts a notice without running the engine; whether the check
      then fails or passes is `on-oversized-diff` (default: fail, so the
      merge gate cannot be padded around).
    required: false
    default: "512"
  max-diff-files:
    description: "Skip the review when the diff touches more than this many files (same notice + on-oversized-diff outcome as max-diff-kb)."
    required: false
    default: "300"
  on-oversized-diff:
    description: >-
      What an oversized-diff skip does to the check. "fail" (default) fails
      it — a diff padded past max-diff-kb / max-diff-files can then never
      bypass a required merge gate. "pass" restores the advisory behavior:
      the skip notice posts and the check stays green.
    required: false
    default: "fail"
  settings:
    description: >-
      Fetch per-repo review settings from the OrcaRouter dashboard at the
      start of each run. Set "false" to skip the fetch entirely and make this
      workflow file authoritative: inputs (or their documented defaults)
      apply as-is and no dashboard value can override them.
    required: false
    default: "true"
  report:
    description: >-
      Send a best-effort per-tier run summary (repo, PR number, head SHA, tier,
      P0/P1/P2 counts, gate result, engine version — never code or finding
      text) to the OrcaRouter control plane. Set "false" to disable.
    required: false
    default: "true"
  engine-version:
    description: "Pinned @alibaba-group/open-code-review version (the review engine). Bump deliberately after testing — the later steps parse its JSON output shape."
    required: false
    default: "1.3.13"

runs:
  using: "composite"
  steps:
    # FIRST, before anything can read $RUNNER_TEMP: a reused self-hosted
    # runner can carry a PREVIOUS run's files (a hard cancel can kill a job
    # before its always() cleanup step gets to run). Clear everything this
    # action writes there — above all policy-block.json, which the
    # always()-running "Surface guardrail / firewall block" step trusts and
    # would otherwise post as a false "merge is blocked" comment on a clean
    # run whose cascade (and its own stale-file rm) never executed.
    - name: Clear stale run files
      shell: bash
      run: |
        rm -f "$RUNNER_TEMP/result.json" "$RUNNER_TEMP/review.log" \
          "$RUNNER_TEMP/result-cheap.json" "$RUNNER_TEMP/result-strong.json" \
          "$RUNNER_TEMP/result-posted.json" "$RUNNER_TEMP/result-extra.json" \
          "$RUNNER_TEMP/result-merged.json" \
          "$RUNNER_TEMP/cr-settings.json" "$RUNNER_TEMP/cr-rubric.md" \
          "$RUNNER_TEMP/cr-facts.json" "$RUNNER_TEMP/proxy.out" "$RUNNER_TEMP/proxy.err" \
          "$RUNNER_TEMP/policy-block.json" \
          "$RUNNER_TEMP/pr.diff" "$RUNNER_TEMP/diff-guard.json" "$RUNNER_TEMP/prev-summary.md"

    - name: Resolve PR refs
      id: pr
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          let base, headSha, num, isDraft, authorAssoc;
          if (context.eventName === 'pull_request_target') {
            base = context.payload.pull_request.base.ref;
            headSha = context.payload.pull_request.head.sha;
            num = context.payload.pull_request.number;
            isDraft = context.payload.pull_request.draft === true;
            authorAssoc = context.payload.pull_request.author_association || 'NONE';
          } else {
            num = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: num,
            });
            base = pr.base.ref; headSha = pr.head.sha;
            isDraft = pr.draft === true;
            authorAssoc = pr.author_association || 'NONE';
          }
          core.setOutput('base', base);
          core.setOutput('head_sha', headSha);
          core.setOutput('number', String(num));
          // The project-conventions doc is only trusted when the PR targets the
          // repository's DEFAULT branch. A PR base is author-chosen: a push-access
          // contributor could create a branch holding a malicious AGENTS.md and
          // target it, so "base" is not inherently protected — but the default
          // branch is the canonical ref they cannot rewrite without an approved
          // merge. (Full branch-protection checks need admin token scope and can
          // 403, so default-branch is the robust proxy.)
          core.setOutput('base_is_default', String(base === context.payload.repository.default_branch));
          // Draft state feeds the settings gate: trigger=ready_for_review
          // skips auto-reviews while the PR is still a draft.
          core.setOutput('is_draft', String(isDraft));
          // PR author's association gates auto-review spend on public repos:
          // pull_request_target bypasses GitHub's fork-approval gate, so the
          // `auto-review-authors` allowlist can restrict which associations
          // trigger a paid auto-review (comment commands stay maintainer-gated
          // in the workflow `if:`).
          core.setOutput('author_association', authorAssoc);

          // Stateful tier: the PR carries an `orca-review:strong` label once it
          // has been promoted to the strong model. No label means it is still on
          // the cheap tier. One run uses exactly ONE model.
          const labels = await github.paginate(
            github.rest.issues.listLabelsOnIssue,
            { owner: context.repo.owner, repo: context.repo.repo, issue_number: num, per_page: 100 },
          );
          const promoted = labels.some((l) => l.name === 'orca-review:strong');
          core.setOutput('tier', promoted ? '1' : '0');
          core.info(`PR #${num} review tier: ${promoted ? '1 (strong)' : '0 (cheap)'}`);

    # Lightweight 👀 acknowledgement so the requester sees the bot noticed the
    # trigger. Static one-shot (no update or removal). Fires early — before any
    # skip gate — so even a skipped run still visibly acknowledges receipt.
    # Reaction outages are non-fatal: the review must never be blocked by a
    # UI-affordance failure.
    - name: React 👀 to acknowledge review request
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        EVENT_NAME: ${{ github.event_name }}
        COMMENT_ID: ${{ github.event.comment.id }}
      run: |
        react() {
          if gh api -X POST "$1" -f content=eyes >/dev/null 2>&1; then
            echo "reacted 👀 -> $1"
          else
            echo "warning: failed to react at $1 (non-fatal)"
          fi
        }
        # Always react on the PR body (issue reactions endpoint — PRs are issues).
        if [ -n "${PR_NUMBER:-}" ]; then
          react "repos/$REPO/issues/$PR_NUMBER/reactions"
        fi
        # For a maintainer's /orca-code-review command, also react on that
        # trigger comment so the operator sees direct feedback on THEIR comment.
        if [ "$EVENT_NAME" = "issue_comment" ] && [ -n "${COMMENT_ID:-}" ]; then
          react "repos/$REPO/issues/comments/$COMMENT_ID/reactions"
        fi

    # setup-node runs BEFORE checkout (it never reads the workspace) so the
    # settings fetch below has node available even on a bare self-hosted runner.
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    # Dashboard-driven behavior, fetched from the gateway BEFORE anything is
    # cloned or installed: a settings-skip should cost nothing. settings.mjs
    # always exits 0 and falls back to the built-in defaults on any outage
    # (fail-open — a settings hiccup must never kill reviews); this step's own
    # parsing falls back the same way, so `decision` is always review|skip.
    - name: Fetch review settings
      id: settings
      shell: bash
      env:
        SETTINGS_SCRIPT: ${{ github.action_path }}/scripts/settings.mjs
        SETTINGS_ENABLED: ${{ inputs.settings }}
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        ORCAROUTER_API_KEY: ${{ inputs.orcarouter-api-key }}
        REPO: ${{ github.repository }}
        SETTINGS_JSON: ${{ runner.temp }}/cr-settings.json
        RUBRIC_FILE: ${{ runner.temp }}/cr-rubric.md
        INPUT_FIX_FIRST: ${{ inputs.fix-first }}
        INPUT_BLOCK_ON: ${{ inputs.block-on }}
        EVENT_NAME: ${{ github.event_name }}
        IS_DRAFT: ${{ steps.pr.outputs.is_draft }}
        AUTHOR_ASSOC: ${{ steps.pr.outputs.author_association }}
        AUTO_REVIEW_AUTHORS: ${{ inputs.auto-review-authors }}
      run: |
        # The auto-event gate is defined UP FRONT — before the settings-disabled
        # short-circuit — so BOTH the settings-disabled (workflow-file-
        # authoritative) and settings-enabled (dashboard) paths share the exact
        # same spend guards. The auto-review-authors allowlist in particular is a
        # WORKFLOW-FILE input, not a dashboard value, so it must gate paid auto
        # reviews on public repos REGARDLESS of whether the dashboard fetch ran.

        # Spend guard for public repos: only auto-review PRs whose author
        # association is in the allowlist. Factored into a function so it is
        # unit-tested directly (settings.test.mjs extracts and runs this exact
        # code). Both sides are space-trimmed the way the JS list parsers are,
        # so "OWNER, MEMBER" still anchors on ",MEMBER,"; the comma wrapping
        # keeps the match a whole-token one (MEMBER never matches inside
        # FIRST_TIME_CONTRIBUTOR). An empty (or all-space) allowlist allows
        # everyone (default, preserves behavior). echoes allow|deny.
        author_allowed() {
          local list assoc
          list=$(printf '%s' "$1" | tr -d ' ')
          assoc=$(printf '%s' "$2" | tr -d ' ')
          if [ -z "$list" ]; then echo allow; return; fi
          if printf '%s' ",$list," | grep -qi ",$assoc,"; then echo allow; else echo deny; fi
        }

        # Auto-event gate -> sets DECISION/REASON. Only AUTO runs are gated —
        # any pull_request* event, so a hand-written plain `pull_request`
        # workflow honors gating exactly like the documented
        # `pull_request_target` one. An explicit `/orca-code-review` comment
        # command (issue_comment) always proceeds — on-demand mode exists
        # precisely for those, and a human asking for a review of a
        # draft/disabled repo is deliberate. Shared by both settings paths so the
        # author-allowlist spend guard holds whether or not the dashboard fetch
        # ran. $1=auto_review $2=trigger $3=is_draft.
        gate_decision() {
          DECISION=review
          REASON=""
          case "$EVENT_NAME" in
            pull_request*)
              if [ "$1" = "false" ]; then
                DECISION=skip; REASON="auto-review is disabled in the OrcaRouter dashboard"
              elif [ "$2" = "on_demand" ]; then
                DECISION=skip; REASON="on-demand mode"
              elif [ "$2" = "ready_for_review" ] && [ "$3" = "true" ]; then
                DECISION=skip; REASON="draft PR"
              elif [ "$(author_allowed "$AUTO_REVIEW_AUTHORS" "$AUTHOR_ASSOC")" = deny ]; then
                # Maintainer comment commands are unaffected (gated in the workflow `if:`).
                DECISION=skip; REASON="author association $AUTHOR_ASSOC not in auto-review-authors"
              fi
              ;;
          esac
        }

        # `settings: "false"` makes the workflow FILE authoritative: skip the
        # fetch entirely, so inputs (or their documented defaults) apply as-is
        # and no dashboard value can override them. (With the fetch on, an
        # input left AT its documented default defers to the server — see the
        # precedence rule below — so e.g. a deliberate `block-on: "P0,P1"` pin
        # could still be overridden from the dashboard.) auto_review/trigger are
        # fixed on (true/every_push) in this mode, so gate_decision can only skip
        # via the author allowlist — a fork author still can't spend on a public
        # repo just because the dashboard fetch is off.
        if [ "$SETTINGS_ENABLED" = "false" ]; then
          echo "settings: disabled via the 'settings' input — the workflow file is authoritative."
          gate_decision true every_push false
          echo "settings: workflow-file-authoritative -> $DECISION ${REASON:+($REASON)}"
          {
            echo "auto_review=true"
            echo "trigger=every_push"
            echo "exhaustive=false"
            echo "quiet=false"
            echo "fix_first=$INPUT_FIX_FIRST"
            echo "block_on=$INPUT_BLOCK_ON"
            echo "rubric_file="
            echo "decision=$DECISION"
            echo "reason=$REASON"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        node "$SETTINGS_SCRIPT" --url "$ORCAROUTER_URL" \
          --repo "$REPO" --out "$SETTINGS_JSON"

        # Read one validated field from the settings file; $2 is the fallback
        # if the file itself is missing/unreadable (settings.mjs already
        # defaulted and validated every field it wrote).
        setting() {
          node -pe 'String(JSON.parse(require("fs").readFileSync(process.env.SETTINGS_JSON, "utf8"))[process.argv[1]])' \
            "$1" 2>/dev/null || printf '%s' "$2"
        }
        AUTO_REVIEW=$(setting auto_review true)
        TRIGGER=$(setting trigger every_push)
        EXHAUSTIVE=$(setting exhaustive false)
        QUIET=$(setting quiet false)
        FIX_FIRST=$(setting fix_first "P0,P1")
        BLOCK_ON=$(setting block_on "P0,P1")
        RUBRIC=$(setting rubric "")

        # PRECEDENCE (documented in the README): an explicit `with:` input that
        # DIFFERS from the action's documented default ("P0,P1") wins over the
        # server settings; an input left at the default defers to the server.
        if [ "$INPUT_FIX_FIRST" != "P0,P1" ]; then FIX_FIRST="$INPUT_FIX_FIRST"; fi
        if [ "$INPUT_BLOCK_ON" != "P0,P1" ]; then BLOCK_ON="$INPUT_BLOCK_ON"; fi

        # A non-empty server rubric REPLACES rules/severity-instruction.md as
        # the --background content; it is exposed as a file path only when set.
        RUBRIC_OUT=""
        if [ -n "$RUBRIC" ]; then
          printf '%s\n' "$RUBRIC" > "$RUBRIC_FILE"
          RUBRIC_OUT="$RUBRIC_FILE"
          echo "Using the server-side rubric ($(wc -c < "$RUBRIC_FILE") bytes) instead of the built-in one."
        fi

        # Settings gate — composable with the diff guard's `decision != 'skip'`.
        # Same gate_decision as the settings-disabled path (defined at the top of
        # this step): the dashboard-fetched auto_review/trigger feed it here,
        # while the author-allowlist spend guard inside it is identical in both
        # paths.
        gate_decision "$AUTO_REVIEW" "$TRIGGER" "$IS_DRAFT"
        echo "settings: auto_review=$AUTO_REVIEW trigger=$TRIGGER exhaustive=$EXHAUSTIVE quiet=$QUIET fix_first=$FIX_FIRST block_on=$BLOCK_ON rubric=${RUBRIC_OUT:+custom} -> $DECISION ${REASON:+($REASON)}"
        {
          echo "auto_review=$AUTO_REVIEW"
          echo "trigger=$TRIGGER"
          echo "exhaustive=$EXHAUSTIVE"
          echo "quiet=$QUIET"
          echo "fix_first=$FIX_FIRST"
          echo "block_on=$BLOCK_ON"
          echo "rubric_file=$RUBRIC_OUT"
          echo "decision=$DECISION"
          echo "reason=$REASON"
        } >> "$GITHUB_OUTPUT"

    # On a settings-skip: leave ONE small marker comment (created if absent,
    # edited only when the reason changes — repeated pushes must not spam the
    # timeline or its edit history), then PASS. No later step runs the engine
    # or the gate, so the job (and a required check) goes green.
    - name: Skip review (settings)
      if: steps.settings.outputs.decision == 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        REASON: ${{ steps.settings.outputs.reason }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Own marker (distinct from the summary and oversized-skip ones).
          const MARKER = '<!-- orca-code-review-disabled -->';
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.</sub>`;
          const body =
            `${MARKER}\n## 🐳 ${brand}\n\n` +
            `⏸️ **Automatic review is off for this PR** (${process.env.REASON}).\n\n` +
            `The check **passes** — this never blocks your merge. A maintainer can still ` +
            `run a review on demand by commenting \`/orca-code-review\`, or change the ` +
            `repo's review settings in the OrcaRouter dashboard.` +
            footer;

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));
          if (!existing) {
            await github.rest.issues.createComment({ ...repo, issue_number: num, body });
          } else if (existing.body !== body) {
            // Only when the reason changed (e.g. on_demand -> draft).
            await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
          }

          await core.summary.addRaw(`skipped: ${process.env.REASON}`).write();
          core.notice(`${brand}: review skipped — ${process.env.REASON}`);

    - uses: actions/checkout@v4
      if: steps.settings.outputs.decision != 'skip'
      with:
        fetch-depth: 0 # full history for the merge-base diff
        ref: ${{ steps.pr.outputs.head_sha }}
        # Don't leave the job token in .git/config: on pull_request_target later
        # steps (incl. the OCR agent reading untrusted PR files) run with secrets,
        # so a prompt-injected file must not be able to read a persisted token.
        persist-credentials: false

    - name: Fetch PR head (covers fork PRs)
      if: steps.settings.outputs.decision != 'skip'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      run: |
        # Authenticate this one fetch with a command-scoped header (works for
        # private repos) so the token is never written to disk for later steps.
        AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
        git -c "http.extraheader=Authorization: Basic $AUTH" \
          fetch origin "pull/${PR_NUMBER}/head"

    - name: Oversized-diff guard
      id: guard
      if: steps.settings.outputs.decision != 'skip'
      shell: bash
      env:
        BRAND: ${{ inputs.brand }}
        BASE: origin/${{ steps.pr.outputs.base }}
        HEAD: ${{ steps.pr.outputs.head_sha }}
        GUARD: ${{ github.action_path }}/scripts/diff-guard.mjs
        MAX_KB: ${{ inputs.max-diff-kb }}
        MAX_FILES: ${{ inputs.max-diff-files }}
        DIFF_FILE: ${{ runner.temp }}/pr.diff
        GUARD_JSON: ${{ runner.temp }}/diff-guard.json
      run: |
        # Size-check the SAME range the engine reviews (merge-base diff),
        # BEFORE anything is installed or run: an oversized PR should cost
        # nothing. `--merge-base` needs git >= 2.30; fall back to the
        # equivalent three-dot form, then fail OPEN (empty file -> "review")
        # if no diff can be produced — a guard glitch must never kill the job.
        git diff --merge-base "$BASE" "$HEAD" > "$DIFF_FILE" 2>/dev/null \
          || git diff "$BASE...$HEAD" > "$DIFF_FILE" 2>/dev/null \
          || { echo "::warning::$BRAND: diff generation failed — size guard failing open."; : > "$DIFF_FILE"; }
        node "$GUARD" --diff "$DIFF_FILE" --max-kb "$MAX_KB" --max-files "$MAX_FILES" > "$GUARD_JSON"
        cat "$GUARD_JSON"
        node -e '
          const fs = require("fs");
          const g = JSON.parse(fs.readFileSync(process.env.GUARD_JSON, "utf8"));
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `decision=${g.decision}\nreason=${g.reason}\nsize_kb=${g.size_kb}\nfiles=${g.files}\n`,
          );
        '

    # On "skip": explain on the PR (upserted — one notice, edited while pushes
    # stay oversized), then apply `on-oversized-diff`. No later step runs the
    # engine or the gate either way. Default "fail": the check goes RED — an
    # unreviewed diff must not satisfy a required merge gate (padding a PR
    # past max-diff-kb would otherwise bypass the P0/P1 gate entirely).
    # "pass" restores the advisory behavior (notice + green check).
    - name: Skip review (diff too large)
      if: steps.guard.outputs.decision == 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        SIZE_KB: ${{ steps.guard.outputs.size_kb }}
        FILES: ${{ steps.guard.outputs.files }}
        REASON: ${{ steps.guard.outputs.reason }}
        MAX_KB: ${{ inputs.max-diff-kb }}
        MAX_FILES: ${{ inputs.max-diff-files }}
        ON_OVERSIZED: ${{ inputs.on-oversized-diff }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Anything that is not an explicit "pass" fails the check (fail-safe).
          const pass = process.env.ON_OVERSIZED === 'pass';
          // Own marker (distinct from the summary comment's): once the PR
          // shrinks and reviews resume, the summary comment takes over (and
          // deletes this notice).
          const MARKER = '<!-- orca-code-review-skip -->';
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.</sub>`;
          const outcome = pass
            ? `and the check **passes** (\`on-oversized-diff: "pass"\`), so this skip does not block your merge.`
            : `and the check **fails** (\`on-oversized-diff: "fail"\`, the default), so an unreviewed ` +
              `diff cannot slip through a required merge gate.`;
          const body =
            `${MARKER}\n## 🐳 ${brand}\n\n` +
            `⏭️ **Review skipped — this PR's diff is too large** (${process.env.REASON}).\n\n` +
            `| | This PR | Limit |\n|---|---|---|\n` +
            `| Diff size | ${process.env.SIZE_KB} KB | ${process.env.MAX_KB} KB |\n` +
            `| Files touched | ${process.env.FILES} | ${process.env.MAX_FILES} |\n\n` +
            `The review engine was **not** run — reviews of very large diffs truncate and ` +
            `lose signal — ${outcome}\n\n` +
            `**What now?** Split the PR (smaller diffs get much higher-signal reviews), raise ` +
            `the limits, or make skips advisory:\n\n` +
            '```yaml\nwith:\n  max-diff-kb: "1024"        # default 512\n  max-diff-files: "500"      # default 300\n  on-oversized-diff: "pass"  # default "fail"\n```' +
            footer;

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));
          if (existing) {
            await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ ...repo, issue_number: num, body });
          }

          await core.summary.addRaw(`skipped: diff too large (${process.env.REASON})`).write();
          if (pass) {
            core.notice(`${brand}: review skipped — ${process.env.REASON}`);
          } else {
            core.setFailed(
              `${brand}: review skipped — ${process.env.REASON}. Failing the check so the merge ` +
              `gate cannot be bypassed by an oversized diff: raise max-diff-kb / max-diff-files, ` +
              `split the PR, or set on-oversized-diff: "pass" to make skips advisory.`,
            );
          }

    - name: Install review engine
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: npm install -g "@alibaba-group/open-code-review@${ENGINE_VERSION}"

    - name: Review (stateful cost-tiered cascade)
      id: cascade
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        TIER_STATE: ${{ steps.pr.outputs.tier }}
        ROUTER: ${{ inputs.router }}
        # Effective value after the settings/input precedence rule.
        FIX_FIRST: ${{ steps.settings.outputs.fix_first }}
        # Non-empty only when the dashboard supplies a replacement rubric.
        RUBRIC_FILE: ${{ steps.settings.outputs.rubric_file }}
        EXHAUSTIVE: ${{ steps.settings.outputs.exhaustive }}
        MERGE: ${{ github.action_path }}/scripts/exhaustive-merge.mjs
        BASE: origin/${{ steps.pr.outputs.base }}
        HEAD: ${{ steps.pr.outputs.head_sha }}
        INSTRUCTION: ${{ github.action_path }}/rules/severity-instruction.md
        # Untrusted-data framing prepended to the project-conventions doc that
        # we extract from the BASE revision and inline into the background file
        # (see the review step): tells the engine the doc may only suppress
        # style findings, never weaken correctness/security or alter severity.
        CONVENTIONS_DIRECTIVE: ${{ github.action_path }}/rules/conventions-directive.md
        # Only load conventions when the PR targets the default branch (base is
        # then a protected ref the PR author cannot rewrite). See the pr step.
        BASE_IS_DEFAULT: ${{ steps.pr.outputs.base_is_default }}
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        CHECK: ${{ github.action_path }}/scripts/check-result.mjs
        PROXY: ${{ github.action_path }}/scripts/fact-proxy.mjs
        BRAND: ${{ inputs.brand }}
        # The real OrcaRouter endpoint. OCR does NOT talk to it directly: the
        # in-job proxy stamps the cascade's facts as headers and forwards here.
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        # Drive OCR entirely through env vars — its highest-priority config source.
        # Nothing is written to the shared ~/.opencodereview, so we neither leak a
        # token to disk nor clobber a self-hosted runner's existing OCR config.
        # The model is the router alias; the router's DSL picks the real model.
        OCR_LLM_TOKEN: ${{ inputs.orcarouter-api-key }}
        OCR_LLM_AUTH_HEADER: authorization
        OCR_LLM_MODEL: ${{ inputs.router }}
        OCR_USE_ANTHROPIC: "false"
        # Pin the engine: a background auto-update would defeat engine-version and
        # could change the JSON shape the later steps parse.
        OCR_NO_UPDATE: "1"
        # Write engine output OUTSIDE the PR checkout. A fork could commit
        # `result.json`/`review.log` as symlinks pointing at e.g. ~/.ssh; a `>`
        # redirect in the working tree would follow them and clobber the target.
        # $RUNNER_TEMP is runner-controlled and reset per job.
        RESULT: ${{ runner.temp }}/result.json
        REVIEW_LOG: ${{ runner.temp }}/review.log
        # Per-tier snapshots of $RESULT (which the escalation pass overwrites):
        # the report steps below need each tier's own severity counts.
        RESULT_CHEAP: ${{ runner.temp }}/result-cheap.json
        RESULT_STRONG: ${{ runner.temp }}/result-strong.json
        # Exhaustive-mode scratch: each extra engine pass lands in
        # $RESULT_EXTRA and is deduped into $RESULT via $RESULT_MERGED.
        RESULT_EXTRA: ${{ runner.temp }}/result-extra.json
        RESULT_MERGED: ${{ runner.temp }}/result-merged.json
        FACTS_FILE: ${{ runner.temp }}/cr-facts.json
        # The proxy writes the guardrail/firewall reason here on a block; a later
        # always()-step posts it to the PR (the cascade itself fails closed).
        POLICY_BLOCK: ${{ runner.temp }}/policy-block.json
      run: |
        set -e

        # Security: we run with secrets against the PR head on pull_request_target,
        # so never let PR-controlled config weaken the review. A fork could commit
        # `.opencodereview/rule.json` to exclude its own changed files or replace
        # the built-in checks, yielding an empty result that passes/promotes as
        # clean. Drop it so OCR uses system defaults + our --background instruction.
        rm -rf .opencodereview

        # Clear any stale block file before the proxy can write a fresh one. On a
        # self-hosted runner $RUNNER_TEMP may be reused, and the always()-step
        # below trusts whatever is here — a leftover block from an earlier run
        # would post a false "merge is blocked" comment on this clean run.
        rm -f "$POLICY_BLOCK"

        # Start the in-job fact-injecting proxy (loopback, ephemeral). OCR can't
        # send custom headers; the proxy stamps x-cr-* facts (from $FACTS_FILE,
        # re-read per request) so the router's DSL can route on them.
        # Pre-create the output files: the backgrounded node opens proxy.out
        # asynchronously, and under `set -e` a first-iteration `sed` on a
        # not-yet-created file would kill the whole step with no diagnostics.
        echo '{}' > "$FACTS_FILE"
        : > "$RUNNER_TEMP/proxy.out"
        : > "$RUNNER_TEMP/proxy.err"
        CR_FACTS_FILE="$FACTS_FILE" CR_POLICY_BLOCK_FILE="$POLICY_BLOCK" node "$PROXY" > "$RUNNER_TEMP/proxy.out" 2> "$RUNNER_TEMP/proxy.err" &
        PROXY_PID=$!
        trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
        for _ in $(seq 1 50); do
          OCR_LLM_URL=$(sed -n 's/^PROXY_URL=//p' "$RUNNER_TEMP/proxy.out" 2>/dev/null || true)
          [ -n "$OCR_LLM_URL" ] && break
          sleep 0.1
        done
        if [ -z "$OCR_LLM_URL" ]; then
          echo "::error::$BRAND: fact proxy failed to start."; cat "$RUNNER_TEMP/proxy.err" || true; exit 1
        fi
        export OCR_LLM_URL

        # Set the raw facts the DSL routes on for the NEXT review pass.
        #   $1 = prev tier (cheap|strong), $2 = prev pass found a fix-first (true|false)
        set_facts() {
          printf '{"x-cr-prev-tier":"%s","x-cr-prev-p0p1":"%s"}' "$1" "$2" > "$FACTS_FILE"
        }

        # The review background is assembled into a FILE, then passed inline via
        # --background "$(cat …)" (the pinned engine 1.3.13 has no
        # --background-file flag). On Linux the arg comfortably holds our sizes
        # (severity rubric ~6 KB + a typical AGENTS.md). Two parts:
        #   1. Severity rubric + [P0]-[P3] tag mandate (rules/severity-instruction.md,
        #      or the dashboard's server-side override, which REPLACES it wholesale;
        #      the untagged->P1 fail-safe still catches slippage). This rides the
        #      background, NOT --rule: a --rule glob REPLACES OCR's built-in
        #      language/security checklist for matched files, and the rubric is
        #      explicitly ADDITIVE on top of that checklist — moving it to --rule
        #      would delete the "what to look for" the rubric depends on.
        #   2. Project conventions, read from the BASE revision — never the PR
        #      head (the engine's file tools can only read the head version, so
        #      we extract the doc ourselves) — and ONLY when the base is the
        #      repo's default branch: a PR base is author-chosen, so an untrusted
        #      base could itself be attacker-controlled. Inlined below, framed as
        #      untrusted data that may only SUPPRESS style findings, and capped so
        #      a large doc cannot push the inlined arg past the OS argv limit.
        BACKGROUND="$RUNNER_TEMP/cr-background.md"
        if [ -n "$RUBRIC_FILE" ] && [ -s "$RUBRIC_FILE" ]; then
          cp "$RUBRIC_FILE" "$BACKGROUND"
          echo "Severity rubric: using the dashboard's server-side override."
        else
          cp "$INSTRUCTION" "$BACKGROUND"
        fi

        # Append the first conventions doc found at the base revision. $BASE is
        # origin/<base ref>; when it is the default branch it is a protected ref
        # the PR author cannot rewrite, so `git show "$BASE:<path>"` is trusted.
        CONVENTIONS_MAX_BYTES=32768
        if [ "$BASE_IS_DEFAULT" = "true" ] && [ -s "$CONVENTIONS_DIRECTIVE" ]; then
          for f in AGENTS.md CLAUDE.md CONTRIBUTING.md; do
            if doc=$(git show "$BASE:$f" 2>/dev/null | head -c "$CONVENTIONS_MAX_BYTES") && [ -n "$doc" ]; then
              {
                printf '\n\n'
                cat "$CONVENTIONS_DIRECTIVE"
                printf '\n\n----- BEGIN %s (untrusted project conventions; read-only reference) -----\n' "$f"
                printf '%s\n' "$doc"
                printf -- '----- END %s -----\n' "$f"
              } >> "$BACKGROUND"
              echo "Project conventions: inlined $f from the base revision ($BASE)."
              break
            fi
          done
        fi

        # One engine pass into $1; returns nonzero on an unusable/partial
        # result. The CALLER decides what that means: a tier's FIRST pass
        # fails the job closed, an exhaustive EXTRA pass just ends the loop
        # (extra depth is best-effort — findings already in hand must survive).
        #   $1 = output file, $2 = log label, $3 = prev tier fact, $4 = prev fix-first fact
        run_pass() {
          set_facts "$3" "$4"
          echo "::group::Review — $2"
          rc=0
          ocr review --from "$BASE" --to "$HEAD" \
            --background "$(cat "$BACKGROUND")" --format json \
            > "$1" 2> "$REVIEW_LOG" || rc=$?
          cat "$REVIEW_LOG"
          echo "::endgroup::"
          node "$CHECK" "$1" "$rc"
        }

        # One TIER: the mandatory first pass, then — exhaustive mode, on the
        # STRONG (enforced) tier only — up to 2 extra engine passes over the
        # same diff (LLM reviews aren't exhaustive in one pass), each deduped
        # into $RESULT by exhaustive-merge.mjs. Cheap-tier extras would be
        # waste: a clear cheap pass escalates and the same-run strong review
        # supersedes it, and a held one wants its fix-first findings fixed
        # before more depth. The loop also stops as soon as a fix-first
        # finding is in hand — the gate blocks on what we already have — or a
        # pass adds nothing new. So the enforced tier runs at most 3 engine
        # passes total. PASSES counts this tier's passes for the summary.
        #   $1 = log label, $2 = prev tier fact, $3 = prev fix-first fact,
        #   $4 = extra passes allowed (true only on the strong tier)
        run_review() {
          if ! run_pass "$RESULT" "$1" "$2" "$3"; then
            echo "::error::$BRAND: review engine produced no usable result — failing closed."
            exit 1
          fi
          PASSES=1
          [ "$EXHAUSTIVE" = "true" ] || return 0
          [ "$4" = "true" ] || return 0
          for extra in 2 3; do
            if node "$GATE" "$RESULT" --has "$FIX_FIRST"; then
              echo "exhaustive: $FIX_FIRST finding(s) already in hand — skipping further passes (fix those first)."
              break
            fi
            if ! run_pass "$RESULT_EXTRA" "$1 — exhaustive pass $extra" "$2" "$3"; then
              # A guardrail/firewall POLICY BLOCK on an extra pass is FATAL —
              # exactly like on the primary pass. The proxy records the block to
              # $POLICY_BLOCK (cleared at step start, and no earlier pass wrote
              # it — its presence pins the block to THIS pass) and OrcaRouter
              # stopped the request BEFORE the model, so the review is
              # incomplete. Swallowing it as a warning would let the required
              # check go green while the always() "Surface guardrail / firewall
              # block" step posts a "merge is blocked" comment — a contradiction.
              # Fail closed; that surface step then renders the reason.
              if [ -f "$POLICY_BLOCK" ]; then
                echo "::error::$BRAND: exhaustive pass $extra blocked by a guardrail/firewall policy — failing closed."
                exit 1
              fi
              # Otherwise a benign tooling failure (engine crash / partial
              # result): extra depth is best-effort, so warn and END exhaustion,
              # keeping the findings already in hand.
              echo "::warning::$BRAND: exhaustive pass $extra produced no usable result — keeping the findings so far."
              break
            fi
            # Guard the merge + parse like the run_pass failure path above: an
            # exhaustive-merge.mjs crash or unparseable output must NOT abort the
            # whole step under `set -e` (that would skip Post/Summary/Enforce and
            # turn a review with valid findings-in-hand red). On any failure,
            # warn and END exhaustion gracefully, keeping the findings so far.
            if ! MERGE_OUT=$(node "$MERGE" --base "$RESULT" --new "$RESULT_EXTRA" --out "$RESULT_MERGED"); then
              echo "::warning::$BRAND: exhaustive pass $extra merge failed — keeping the findings so far."
              break
            fi
            mv "$RESULT_MERGED" "$RESULT"
            PASSES=$extra
            if ! NEW_FINDINGS=$(MERGE_JSON="$MERGE_OUT" node -pe 'JSON.parse(process.env.MERGE_JSON).new_findings'); then
              echo "::warning::$BRAND: exhaustive pass $extra produced unparseable merge output — keeping the findings so far."
              break
            fi
            echo "exhaustive: pass $extra added $NEW_FINDINGS new finding(s)."
            [ "$NEW_FINDINGS" -gt 0 ] || break
          done
        }

        # Single review pass per run (gpt-5.5). The cheap->strong cascade was
        # retired: testing showed the cheap tier added no value online — it fails
        # closed on large diffs and otherwise just escalates anyway, taxing every
        # PR with latency for no decision. We inject the strong-tier facts
        # (prev-tier=strong) so the DSL's `promoted` rule routes gpt-5.5 for every
        # run, and run exactly one enforced pass (exhaustive extras still allowed
        # via the 4th arg). PROMOTE/HELD stay false and `cheap_gate` is never
        # written, so the promotion-label step and the cheap report step no-op and
        # the Enforce step does a plain single-pass gate. Size-based front routing
        # (small->cheap, large->strong, decided up front) is a planned later
        # optimization and is also single-pass, so this shape stays
        # forward-compatible: the facts and the DSL rule shape are preserved.
        PROMOTE=false
        HELD=false
        PASSES=1
        run_review "review (gpt-5.5)" "strong" "false" true
        cp "$RESULT" "$RESULT_STRONG"
        echo "strong_ran=true" >> "$GITHUB_OUTPUT"
        echo "promote=$PROMOTE" >> "$GITHUB_OUTPUT"
        echo "held=$HELD" >> "$GITHUB_OUTPUT"
        # Engine passes behind the FINAL result (the last tier that ran) —
        # >1 only in exhaustive mode; the summary comment notes it.
        echo "passes=$PASSES" >> "$GITHUB_OUTPUT"

    # If a dashboard guardrail/firewall blocked the request, the cascade above
    # failed closed and the normal review comment never runs. Surface the reason
    # on the PR so the block is actionable, not just a red X with a log line.
    # always() so it posts despite the failed cascade; no-op when no block file.
    # The guard condition also keeps a STALE block file from being posted on a
    # skipped run (the cascade's own cleanup never ran on a skip).
    - name: Surface guardrail / firewall block
      if: always() && steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        POLICY_BLOCK: ${{ runner.temp }}/policy-block.json
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          let block;
          try {
            block = JSON.parse(fs.readFileSync(process.env.POLICY_BLOCK, 'utf8'));
          } catch {
            return; // no guardrail/firewall block this run
          }
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Own marker (distinct from the summary/skip/disabled ones): the block
          // is upserted so a PR that trips a guardrail on every push gets ONE
          // edited comment, not a fresh one each time; the summary step retires
          // it once a clean review posts.
          const MARKER = '<!-- orca-code-review-block -->';
          const layer = block.kind === 'firewall' ? 'firewall' : 'guardrail';
          const policyLine = block.policyName
            ? `\n\n**Policy:** \`${String(block.policyName).slice(0, 120)}\``
            : '';
          const detail = block.detail ? String(block.detail).slice(0, 300) : '';
          const matchedLine = detail ? `\n\n**Matched:** ${detail}` : '';
          const idTag = block.requestId
            ? ` · request id \`${String(block.requestId).slice(0, 80)}\``
            : '';
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.${idTag}</sub>`;
          const body =
            `${MARKER}\n## 🐳 ${brand}\n\n` +
            `🛡️ **Review blocked by a ${layer} policy.**` +
            policyLine +
            matchedLine +
            `\n\nOrcaRouter's ${layer} matched this PR against a configured policy and ` +
            `stopped the request **before it reached the model** — the flagged content was ` +
            `never sent to the LLM provider. Because the diff wasn't reviewed, the merge is blocked.` +
            `\n\n**What to do**\n` +
            `- Remove or fix the flagged content (commonly a secret, credential, or other restricted text in the diff).\n` +
            `- Keep secrets out of the repo — use GitHub Actions secrets or a secrets manager, referenced at deploy time.\n` +
            `- If a real secret was exposed, rotate it now.\n` +
            `- Push the fix and the review will re-run automatically.` +
            footer;
          // Upsert by marker — find an existing block comment and edit it (only
          // when the reason changed), else create one, mirroring the skip-notice
          // pattern above. A guardrail that trips on every push must not spam.
          const existingComments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          const existing = existingComments.find((c) => c.body && c.body.includes(MARKER));
          if (!existing) {
            await github.rest.issues.createComment({ ...repo, issue_number: num, body });
          } else if (existing.body !== body) {
            await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
          }

    - name: Promote tier
      if: steps.cascade.outputs.promote == 'true'
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          const name = 'orca-review:strong';

          // The documented setup does not create this label, and addLabels only
          // attaches labels that already exist — so ensure it exists first,
          // otherwise the very first promotion would fail instead of recording.
          try {
            await github.rest.issues.getLabel({ ...repo, name });
          } catch (e) {
            if (e.status !== 404) throw e;
            try {
              await github.rest.issues.createLabel({
                ...repo, name, color: '0e8a16',
                description: 'Orca-Code-Review: promoted to the strong model tier',
              });
              core.info(`Created repository label ${name}.`);
            } catch (e2) {
              // A parallel first promotion may have created it between our
              // getLabel and createLabel — 422 "already_exists" is fine.
              if (e2.status !== 422) throw e2;
              core.info(`Label ${name} was created concurrently — continuing.`);
            }
          }

          await github.rest.issues.addLabels({ ...repo, issue_number: num, labels: [name] });
          core.info(`PR #${num} promoted to review tier 1 (strong model).`);

    # What gets POSTED is decoupled from what gets ENFORCED: this step always
    # produces $RESULT_POSTED for the posting step — a straight copy normally,
    # or with P2 comments dropped when quiet mode is on (dashboard settings).
    # The severity gate, the summary counts, and the run reports keep reading
    # the UNfiltered result: quiet mutes timeline noise, never enforcement.
    - name: Quiet mode filter
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        QUIET: ${{ steps.settings.outputs.quiet }}
        QUIET_FILTER: ${{ github.action_path }}/scripts/quiet-filter.mjs
        RESULT: ${{ runner.temp }}/result.json
        RESULT_POSTED: ${{ runner.temp }}/result-posted.json
      run: |
        if [ "$QUIET" = "true" ]; then
          node "$QUIET_FILTER" "$RESULT" --drop P2 --out "$RESULT_POSTED"
        else
          cp "$RESULT" "$RESULT_POSTED"
        fi

    - name: Post review comments
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        # The quiet-filtered copy — see the "Quiet mode filter" step above.
        RESULT: ${{ runner.temp }}/result-posted.json
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const sha = process.env.HEAD_SHA;
          const repo = { owner: context.repo.owner, repo: context.repo.repo };

          let result = { comments: [] };
          try {
            result = JSON.parse(fs.readFileSync(process.env.RESULT, 'utf8'));
          } catch (e) {
            console.log('Could not parse result.json:', e.message);
          }
          const comments = result.comments || [];
          // OrcaRouter design: 🐳 header, colored severity dots, brand tagline.
          const SEV = { P0: '🔴', P1: '🟠', P2: '🟡', P3: '⚪' };
          // Attribution for the Apache-2.0 engine lives in NOTICE + README, not
          // in every comment — OCR is consumed as a package, not redistributed.
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.</sub>`;

          if (comments.length === 0) {
            // Clean run: no separate notice — the upserted summary comment
            // (next step) already reports the clean state without adding a
            // new timeline entry on every push.
            return;
          }

          // Severity from the LEADING [P0]/[P1]/[P2]/[P3] tag only (mirrors gate.mjs);
          // a later mention must not override the missing-tag P1 fail-safe.
          const tagRe = /^\s*\[(P[0-3])\]\s*/i;
          const sevOf = (c) => {
            const m = String(c.content || '').match(tagRe);
            return m ? m[1].toUpperCase() : 'P1';
          };
          // Display form (Codex-style): a colored severity badge, then a bold
          // subtitle + prose ONLY when we can split cleanly; otherwise the finding
          // stays whole. OCR emits a single `[Px] <prose>` string with no title
          // field, and a forced split reads worse than no split (mid-phrase breaks,
          // lowercase fragments). So we split on just two reliable signals: a
          // model-written **bold** lead, or a short first sentence (which keeps the
          // body starting on a fresh, capitalized sentence). Anything else: whole.
          const decorate = (c) => {
            const text = String(c.content || '');
            const m = text.match(tagRe);
            const sev = m ? m[1].toUpperCase() : 'P1';
            const badge = `${SEV[sev]} **${sev}**`;
            const raw = (m ? text.slice(m[0].length) : text).trim();
            const mk = (t) => t.replace(/\*\*/g, '').replace(/[.!?]+$/, '').trim();
            // 1) The model sometimes writes its own **bold** lead — use it verbatim.
            const lead = raw.match(/^\*\*(.+?)\*\*\s+([\s\S]+)$/);
            if (lead) {
              return `${badge} **${mk(lead[1])}**\n\n${lead[2].replace(/\*\*/g, '').trim()}`;
            }
            // 2) Else split only when the first sentence is short enough to title.
            const rest = raw.replace(/\*\*/g, '');
            const end = rest.search(/(?<=[.!?])\s/);
            if (end > 0 && end <= 72) {
              return `${badge} **${mk(rest.slice(0, end))}**\n\n${rest.slice(end).trim()}`;
            }
            // 3) Hard to separate cleanly — keep the finding whole.
            return `${badge} ${rest}`;
          };
          const counts = {};
          for (const c of comments) counts[sevOf(c)] = (counts[sevOf(c)] || 0) + 1;
          const breakdown = ['P0', 'P1', 'P2', 'P3']
            .filter((s) => counts[s])
            .map((s) => `${SEV[s]} ${counts[s]} ${s}`)
            .join(' · ');
          const n = comments.length;
          const summary =
            `## 🐳 ${brand}\n\n` +
            `Found **${n}** issue${n === 1 ? '' : 's'} in this PR: ${breakdown}.`;

          const inline = [];
          const rest = [];
          for (const c of comments) {
            const line =
              c.end_line >= 1 ? c.end_line : c.start_line >= 1 ? c.start_line : 0;
            if (line >= 1 && c.path) {
              inline.push({ path: c.path, line, side: 'RIGHT', body: decorate(c) });
            } else {
              rest.push(c);
            }
          }
          let body = summary;
          for (const c of rest) body += `\n\n---\n\`${c.path}\`: ${decorate(c)}`;

          try {
            await github.rest.pulls.createReview({
              ...repo, pull_number: num, commit_id: sha,
              body: body + footer, event: 'COMMENT',
              comments: inline,
            });
          } catch (e) {
            console.log('Inline review failed, posting findings as a comment:', e.message);
            // The inline batch carries the actual findings; if GitHub rejects it
            // (uncommentable line, batch too large) append them as text so users
            // still see the details instead of bare counts.
            let fallback = body;
            for (const c of inline) {
              fallback += `\n\n---\n\`${c.path}\` (line ${c.line}): ${c.body}`;
            }
            await github.rest.issues.createComment({ ...repo, issue_number: num, body: fallback + footer });
          }

    # ONE summary per PR, written into the PR DESCRIPTION body (the only element
    # GitHub anchors at the very top) inside a marker-delimited region that is
    # replaced in place on every push: severity counts with Δ vs the previous
    # push (state travels in an HTML comment inside the region), the tier, and
    # the gate verdict. The author's own description text is preserved untouched.
    # Runs BEFORE the enforce step so a blocked run still updates the summary.
    - name: Summary (PR description)
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        # Deliberately the UNfiltered result: the summary shows TRUE counts
        # (its quiet-mode note explains why fewer P2s appear inline).
        RESULT: ${{ runner.temp }}/result.json
        PREV_BODY: ${{ runner.temp }}/prev-summary.md
        SUMMARY_SCRIPT: ${{ github.action_path }}/scripts/summary-comment.mjs
        INJECT_SCRIPT: ${{ github.action_path }}/scripts/inject-summary.mjs
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        BLOCK_ON: ${{ steps.settings.outputs.block_on }}
        # Fix-first set — the ❌ count is taken over THIS (not block-on) on a held run.
        FIX_FIRST: ${{ steps.settings.outputs.fix_first }}
        HELD: ${{ steps.cascade.outputs.held }}
        STRONG_RAN: ${{ steps.cascade.outputs.strong_ran }}
        QUIET: ${{ steps.settings.outputs.quiet }}
        PASSES: ${{ steps.cascade.outputs.passes }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const { pathToFileURL } = require('url');
          const { injectSummary, extractRegion } = await import(pathToFileURL(process.env.INJECT_SCRIPT).href);
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Legacy marker: earlier versions posted the summary as an issue
          // comment. Keep in sync with scripts/summary-comment.mjs.
          const MARKER = '<!-- orca-code-review-summary -->';

          // A real review ran, so retire stale notices (best-effort): the
          // "automatic review is off", "diff too large", and guardrail/firewall
          // "review blocked" comments would otherwise outlive the condition they
          // describe once a clean review posts. Also delete a legacy summary
          // issue comment from a pre-description-body install so it doesn't
          // linger as a duplicate of the description summary.
          const comments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          for (const stale of ['<!-- orca-code-review-disabled -->', '<!-- orca-code-review-skip -->', '<!-- orca-code-review-block -->', MARKER]) {
            const notice = comments.find((c) => c.body && c.body.includes(stale));
            if (!notice) continue;
            try {
              await github.rest.issues.deleteComment({ ...repo, comment_id: notice.id });
            } catch (e) {
              console.log(`Could not delete a stale notice (${stale}):`, e.message);
            }
          }

          // Read the current PR description; the previous summary (if any) lives
          // in its marker region. Feed that back for the Δ column and number
          // this push from its machine state (first summary = push 1).
          const { data: pr } = await github.rest.pulls.get({ ...repo, pull_number: num });
          const prevRegion = extractRegion(pr.body);
          const args = [process.env.SUMMARY_SCRIPT, process.env.RESULT];
          let push = 1;
          if (prevRegion) {
            fs.writeFileSync(process.env.PREV_BODY, prevRegion);
            args.push('--prev', process.env.PREV_BODY);
            const m = prevRegion.match(/<!-- orca-cr-state: (\{.*?\}) -->/);
            if (m) {
              try { push = (Number(JSON.parse(m[1]).push) || 0) + 1; } catch { /* keep 1 */ }
            }
          }

          // Mirror the enforce step's verdict: held blocks; otherwise gate.mjs
          // on the final result (exit 0 = a BLOCK_ON severity is present).
          let blocked = process.env.HELD === 'true';
          if (!blocked) {
            try {
              execFileSync('node', [process.env.GATE, process.env.RESULT, '--has', process.env.BLOCK_ON], { stdio: 'pipe' });
              blocked = true;
            } catch { blocked = false; }
          }
          const tier = process.env.STRONG_RAN === 'true' ? 'strong' : 'cheap';
          args.push('--tier', tier, '--push', String(push), '--gate', blocked ? 'blocked' : 'pass');
          // The ❌ line counts findings against the EFFECTIVE block-on set
          // (dashboard/input precedence already applied) — an empty string is
          // a deliberate "block on nothing" and passes through as-is.
          args.push('--block-on', process.env.BLOCK_ON ?? 'P0,P1');
          // Held run (cheap tier withheld escalation on fix-first findings): the
          // ❌ count must reflect the FIX-FIRST set, not block-on — block-on may
          // not include those severities (a repo can even set block_on=''), and
          // counting over it would render "❌ 0 findings block merge" next to the
          // held tier line. --held switches the count to fix-first.
          if (process.env.HELD === 'true') {
            args.push('--held', '--fix-first', process.env.FIX_FIRST ?? 'P0,P1');
          }
          // Mode notes: exhaustive pass count (renders only when > 1) and the
          // quiet-mode explainer next to the true counts.
          args.push('--passes', process.env.PASSES || '1');
          if (process.env.QUIET === 'true') args.push('--quiet');

          const summaryMd = execFileSync('node', args, { encoding: 'utf8' });
          // Preserve the author's description text; only the marker region changes.
          const newBody = injectSummary(pr.body, summaryMd);
          if (newBody !== (pr.body || '')) {
            await github.rest.pulls.update({ ...repo, pull_number: num, body: newBody });
          }

    - name: Enforce severity gate
      if: steps.settings.outputs.decision != 'skip' && steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        BRAND: ${{ inputs.brand }}
        # Effective values after the settings/input precedence rule.
        BLOCK_ON: ${{ steps.settings.outputs.block_on }}
        FIX_FIRST: ${{ steps.settings.outputs.fix_first }}
        HELD: ${{ steps.cascade.outputs.held }}
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        # ALWAYS the unfiltered result — quiet mode never weakens the gate.
        RESULT: ${{ runner.temp }}/result.json
      run: |
        if [ "$HELD" = "true" ]; then
          echo "::error::$BRAND: cheap tier found $FIX_FIRST finding(s) to fix before the strong-tier review runs — blocking."
          exit 1
        fi
        if node "$GATE" "$RESULT" --has "$BLOCK_ON"; then
          echo "::error::$BRAND: blocking — found $BLOCK_ON severity finding(s)."
          exit 1
        fi
        echo "$BRAND: no $BLOCK_ON findings — gate passed."

    # Best-effort run counters to the OrcaRouter control plane — severity
    # counts and the gate verdict only, never code (see README "Run
    # reporting"). One step per tier that ran, AFTER the gate: always() because
    # a blocked gate fails the job above, and blocked runs must report too.
    # report.mjs itself exits 0 on any error, so these steps can't fail the job.
    - name: Report run (cheap tier)
      # `cheap_gate` doubles as "the cheap tier ran to a gate decision".
      if: always() && inputs.report == 'true' && steps.cascade.outputs.cheap_gate != ''
      shell: bash
      env:
        REPORT: ${{ github.action_path }}/scripts/report.mjs
        RESULT_CHEAP: ${{ runner.temp }}/result-cheap.json
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        CHEAP_GATE: ${{ steps.cascade.outputs.cheap_gate }}
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        ORCAROUTER_API_KEY: ${{ inputs.orcarouter-api-key }}
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: |
        node "$REPORT" "$RESULT_CHEAP" \
          --repo "$REPO" --pr "$PR_NUMBER" --sha "$HEAD_SHA" \
          --tier cheap --gate "$CHEAP_GATE" \
          --url "$ORCAROUTER_URL" \
          --engine-version "$ENGINE_VERSION"

    - name: Report run (strong tier)
      if: always() && inputs.report == 'true' && steps.cascade.outputs.strong_ran == 'true'
      shell: bash
      env:
        REPORT: ${{ github.action_path }}/scripts/report.mjs
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        RESULT_STRONG: ${{ runner.temp }}/result-strong.json
        BLOCK_ON: ${{ steps.settings.outputs.block_on }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        ORCAROUTER_API_KEY: ${{ inputs.orcarouter-api-key }}
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: |
        # The strong tier's verdict re-uses gate.mjs on its snapshot
        # (exit 0 = a BLOCK_ON severity is present = blocked).
        GATE_RESULT=pass
        if node "$GATE" "$RESULT_STRONG" --has "$BLOCK_ON"; then GATE_RESULT=blocked; fi
        node "$REPORT" "$RESULT_STRONG" \
          --repo "$REPO" --pr "$PR_NUMBER" --sha "$HEAD_SHA" \
          --tier strong --gate "$GATE_RESULT" \
          --url "$ORCAROUTER_URL" \
          --engine-version "$ENGINE_VERSION"

    - name: Clean up engine output
      if: always()
      shell: bash
      run: |
        # Remove only the files THIS run created in $RUNNER_TEMP so review output
        # doesn't linger across jobs on a self-hosted runner. We deliberately do
        # not touch ~/.opencodereview: we never write the shared config (all OCR
        # settings come from env vars), and deleting it would corrupt the OCR
        # state of other jobs/users on the same runner.
        rm -f "$RUNNER_TEMP/result.json" "$RUNNER_TEMP/review.log" \
          "$RUNNER_TEMP/result-cheap.json" "$RUNNER_TEMP/result-strong.json" \
          "$RUNNER_TEMP/result-posted.json" "$RUNNER_TEMP/result-extra.json" \
          "$RUNNER_TEMP/result-merged.json" \
          "$RUNNER_TEMP/cr-settings.json" "$RUNNER_TEMP/cr-rubric.md" \
          "$RUNNER_TEMP/cr-facts.json" "$RUNNER_TEMP/proxy.out" "$RUNNER_TEMP/proxy.err" \
          "$RUNNER_TEMP/policy-block.json" \
          "$RUNNER_TEMP/pr.diff" "$RUNNER_TEMP/diff-guard.json" "$RUNNER_TEMP/prev-summary.md"
