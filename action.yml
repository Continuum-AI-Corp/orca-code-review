# OrcaRouter Code Review — reusable composite action.
#
# Consumers reference this with `uses:` instead of copying the folder; see
# workflows/orcarouter-code-review.yml for the ~15-line example workflow.
#
# Stateful cost-tiered cascade: each PR stores its current tier as an
# `orca-review:strong` label. A PR with no label runs the cheap tier first; if
# that pass is clear of `fix-first` (P0/P1) it escalates to the strong tier in
# the SAME run — so the strong tier always reviews before merge — and records a
# permanent promotion so later pushes go straight to the strong tier. While the
# cheap tier still finds `fix-first`, the strong tier is withheld (fix those
# first — no point paying for it while obvious bugs remain). Findings post as
# inline PR comments and a severity gate can fail the check to block the merge.
#
# Model selection is NOT hardcoded here. The action only DECIDES the tier and
# emits it as raw facts (x-cr-prev-tier / x-cr-prev-p0p1). OCR can't send custom
# headers, so an in-job loopback proxy (scripts/fact-proxy.mjs) stamps those
# facts onto OCR's requests; the workspace router's DSL recipe
# (recipes/code-review.dsl.yaml) maps them to the concrete cheap/strong model.
#
# Around the cascade: an oversized-diff guard (scripts/diff-guard.mjs) decides
# review/skip BEFORE the engine ever runs (a skip passes the check with a
# notice — it never blocks a merge); one summary comment per PR
# (scripts/summary-comment.mjs) is upserted in place on every push; and a
# best-effort per-tier run report (scripts/report.mjs) posts severity counts —
# never code — to the OrcaRouter control plane after the gate.

name: "OrcaRouter Code Review"
description: "AI PR review via the OrcaRouter gateway — cost-tiered cascade with a severity merge gate."
author: "OrcaRouter"

branding:
  icon: "git-pull-request"
  color: "blue"

inputs:
  orcarouter-api-key:
    description: "OrcaRouter API key."
    required: true
  orcarouter-url:
    description: "OrcaRouter chat-completions endpoint."
    required: false
    default: "https://api.orcarouter.ai/v1/chat/completions"
  github-token:
    description: "Token used to fetch the PR head, post review comments, and manage the tier label."
    required: false
    default: ${{ github.token }}
  brand:
    description: "Name shown on PR comments."
    required: false
    default: "OrcaRouter Code Review"
  router:
    description: >-
      OrcaRouter router alias (orcarouter/<name>) that owns model selection.
      The action names no models: it injects the cascade's raw facts
      (x-cr-prev-tier / x-cr-prev-p0p1) as headers and this router's DSL recipe
      maps them to the cheap/strong model. See recipes/code-review.dsl.yaml.
    required: false
    default: "orcarouter/code-review"
  fix-first:
    description: "Severities that withhold the strong tier until fixed at the cheap tier."
    required: false
    default: "P0,P1"
  block-on:
    description: "Severities that fail the check (block the merge)."
    required: false
    default: "P0,P1"
  max-diff-kb:
    description: >-
      Skip the review when the PR's merge-base diff is bigger than this many
      KB. A skip posts a notice and PASSES the check (it never blocks a merge)
      without running the engine.
    required: false
    default: "512"
  max-diff-files:
    description: "Skip the review when the diff touches more than this many files (same pass-with-notice behavior as max-diff-kb)."
    required: false
    default: "300"
  report:
    description: >-
      Send a best-effort per-tier run summary (repo, PR number, head SHA, tier,
      P0/P1/P2 counts, gate result, engine version — never code or finding
      text) to the OrcaRouter control plane. Set "false" to disable.
    required: false
    default: "true"
  engine-version:
    description: "Pinned @alibaba-group/open-code-review version (the review engine). Bump deliberately after testing — the later steps parse its JSON output shape."
    required: false
    default: "1.3.13"

runs:
  using: "composite"
  steps:
    - name: Resolve PR refs
      id: pr
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          let base, headSha, num;
          if (context.eventName === 'pull_request_target') {
            base = context.payload.pull_request.base.ref;
            headSha = context.payload.pull_request.head.sha;
            num = context.payload.pull_request.number;
          } else {
            num = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: num,
            });
            base = pr.base.ref; headSha = pr.head.sha;
          }
          core.setOutput('base', base);
          core.setOutput('head_sha', headSha);
          core.setOutput('number', String(num));

          // Stateful tier: the PR carries an `orca-review:strong` label once it
          // has been promoted to the strong model. No label means it is still on
          // the cheap tier. One run uses exactly ONE model.
          const labels = await github.paginate(
            github.rest.issues.listLabelsOnIssue,
            { owner: context.repo.owner, repo: context.repo.repo, issue_number: num, per_page: 100 },
          );
          const promoted = labels.some((l) => l.name === 'orca-review:strong');
          core.setOutput('tier', promoted ? '1' : '0');
          core.info(`PR #${num} review tier: ${promoted ? '1 (strong)' : '0 (cheap)'}`);

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # full history for the merge-base diff
        ref: ${{ steps.pr.outputs.head_sha }}
        # Don't leave the job token in .git/config: on pull_request_target later
        # steps (incl. the OCR agent reading untrusted PR files) run with secrets,
        # so a prompt-injected file must not be able to read a persisted token.
        persist-credentials: false

    - name: Fetch PR head (covers fork PRs)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      run: |
        # Authenticate this one fetch with a command-scoped header (works for
        # private repos) so the token is never written to disk for later steps.
        AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
        git -c "http.extraheader=Authorization: Basic $AUTH" \
          fetch origin "pull/${PR_NUMBER}/head"

    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Oversized-diff guard
      id: guard
      shell: bash
      env:
        BRAND: ${{ inputs.brand }}
        BASE: origin/${{ steps.pr.outputs.base }}
        HEAD: ${{ steps.pr.outputs.head_sha }}
        GUARD: ${{ github.action_path }}/scripts/diff-guard.mjs
        MAX_KB: ${{ inputs.max-diff-kb }}
        MAX_FILES: ${{ inputs.max-diff-files }}
        DIFF_FILE: ${{ runner.temp }}/pr.diff
        GUARD_JSON: ${{ runner.temp }}/diff-guard.json
      run: |
        # Size-check the SAME range the engine reviews (merge-base diff),
        # BEFORE anything is installed or run: an oversized PR should cost
        # nothing. `--merge-base` needs git >= 2.30; fall back to the
        # equivalent three-dot form, then fail OPEN (empty file -> "review")
        # if no diff can be produced — a guard glitch must never kill the job.
        git diff --merge-base "$BASE" "$HEAD" > "$DIFF_FILE" 2>/dev/null \
          || git diff "$BASE...$HEAD" > "$DIFF_FILE" 2>/dev/null \
          || { echo "::warning::$BRAND: diff generation failed — size guard failing open."; : > "$DIFF_FILE"; }
        node "$GUARD" --diff "$DIFF_FILE" --max-kb "$MAX_KB" --max-files "$MAX_FILES" > "$GUARD_JSON"
        cat "$GUARD_JSON"
        node -e '
          const fs = require("fs");
          const g = JSON.parse(fs.readFileSync(process.env.GUARD_JSON, "utf8"));
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `decision=${g.decision}\nreason=${g.reason}\nsize_kb=${g.size_kb}\nfiles=${g.files}\n`,
          );
        '

    # On "skip": explain on the PR (upserted — one notice, edited while pushes
    # stay oversized), then PASS. No later step runs the engine or the gate, so
    # the job (and a required check) goes green — a skip must not block merges.
    - name: Skip review (diff too large)
      if: steps.guard.outputs.decision == 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        SIZE_KB: ${{ steps.guard.outputs.size_kb }}
        FILES: ${{ steps.guard.outputs.files }}
        REASON: ${{ steps.guard.outputs.reason }}
        MAX_KB: ${{ inputs.max-diff-kb }}
        MAX_FILES: ${{ inputs.max-diff-files }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Own marker (distinct from the summary comment's): once the PR
          // shrinks and reviews resume, the summary comment takes over.
          const MARKER = '<!-- orca-code-review-skip -->';
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.</sub>`;
          const body =
            `${MARKER}\n## 🐳 ${brand}\n\n` +
            `⏭️ **Review skipped — this PR's diff is too large** (${process.env.REASON}).\n\n` +
            `| | This PR | Limit |\n|---|---|---|\n` +
            `| Diff size | ${process.env.SIZE_KB} KB | ${process.env.MAX_KB} KB |\n` +
            `| Files touched | ${process.env.FILES} | ${process.env.MAX_FILES} |\n\n` +
            `The review engine was **not** run — reviews of very large diffs truncate and ` +
            `lose signal — and the check **passes**, so this never blocks your merge.\n\n` +
            `**Want it reviewed anyway?** Raise the limits on the action:\n\n` +
            '```yaml\nwith:\n  max-diff-kb: "1024"    # default 512\n  max-diff-files: "500"  # default 300\n```\n\n' +
            `Or split the PR — smaller diffs get much higher-signal reviews.` +
            footer;

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));
          if (existing) {
            await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ ...repo, issue_number: num, body });
          }

          await core.summary.addRaw(`skipped: diff too large (${process.env.REASON})`).write();
          core.notice(`${brand}: review skipped — ${process.env.REASON}`);

    - name: Install review engine
      if: steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: npm install -g "@alibaba-group/open-code-review@${ENGINE_VERSION}"

    - name: Review (stateful cost-tiered cascade)
      id: cascade
      if: steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        TIER_STATE: ${{ steps.pr.outputs.tier }}
        ROUTER: ${{ inputs.router }}
        FIX_FIRST: ${{ inputs.fix-first }}
        BASE: origin/${{ steps.pr.outputs.base }}
        HEAD: ${{ steps.pr.outputs.head_sha }}
        INSTRUCTION: ${{ github.action_path }}/rules/severity-instruction.md
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        CHECK: ${{ github.action_path }}/scripts/check-result.mjs
        PROXY: ${{ github.action_path }}/scripts/fact-proxy.mjs
        BRAND: ${{ inputs.brand }}
        # The real OrcaRouter endpoint. OCR does NOT talk to it directly: the
        # in-job proxy stamps the cascade's facts as headers and forwards here.
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        # Drive OCR entirely through env vars — its highest-priority config source.
        # Nothing is written to the shared ~/.opencodereview, so we neither leak a
        # token to disk nor clobber a self-hosted runner's existing OCR config.
        # The model is the router alias; the router's DSL picks the real model.
        OCR_LLM_TOKEN: ${{ inputs.orcarouter-api-key }}
        OCR_LLM_AUTH_HEADER: authorization
        OCR_LLM_MODEL: ${{ inputs.router }}
        OCR_USE_ANTHROPIC: "false"
        # Pin the engine: a background auto-update would defeat engine-version and
        # could change the JSON shape the later steps parse.
        OCR_NO_UPDATE: "1"
        # Write engine output OUTSIDE the PR checkout. A fork could commit
        # `result.json`/`review.log` as symlinks pointing at e.g. ~/.ssh; a `>`
        # redirect in the working tree would follow them and clobber the target.
        # $RUNNER_TEMP is runner-controlled and reset per job.
        RESULT: ${{ runner.temp }}/result.json
        REVIEW_LOG: ${{ runner.temp }}/review.log
        # Per-tier snapshots of $RESULT (which the escalation pass overwrites):
        # the report steps below need each tier's own severity counts.
        RESULT_CHEAP: ${{ runner.temp }}/result-cheap.json
        RESULT_STRONG: ${{ runner.temp }}/result-strong.json
        FACTS_FILE: ${{ runner.temp }}/cr-facts.json
        # The proxy writes the guardrail/firewall reason here on a block; a later
        # always()-step posts it to the PR (the cascade itself fails closed).
        POLICY_BLOCK: ${{ runner.temp }}/policy-block.json
      run: |
        set -e

        # Security: we run with secrets against the PR head on pull_request_target,
        # so never let PR-controlled config weaken the review. A fork could commit
        # `.opencodereview/rule.json` to exclude its own changed files or replace
        # the built-in checks, yielding an empty result that passes/promotes as
        # clean. Drop it so OCR uses system defaults + our --background instruction.
        rm -rf .opencodereview

        # Clear any stale block file before the proxy can write a fresh one. On a
        # self-hosted runner $RUNNER_TEMP may be reused, and the always()-step
        # below trusts whatever is here — a leftover block from an earlier run
        # would post a false "merge is blocked" comment on this clean run.
        rm -f "$POLICY_BLOCK"

        # Start the in-job fact-injecting proxy (loopback, ephemeral). OCR can't
        # send custom headers; the proxy stamps x-cr-* facts (from $FACTS_FILE,
        # re-read per request) so the router's DSL can route on them.
        echo '{}' > "$FACTS_FILE"
        CR_FACTS_FILE="$FACTS_FILE" CR_POLICY_BLOCK_FILE="$POLICY_BLOCK" node "$PROXY" > "$RUNNER_TEMP/proxy.out" 2> "$RUNNER_TEMP/proxy.err" &
        PROXY_PID=$!
        trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
        for _ in $(seq 1 50); do
          OCR_LLM_URL=$(sed -n 's/^PROXY_URL=//p' "$RUNNER_TEMP/proxy.out")
          [ -n "$OCR_LLM_URL" ] && break
          sleep 0.1
        done
        if [ -z "$OCR_LLM_URL" ]; then
          echo "::error::$BRAND: fact proxy failed to start."; cat "$RUNNER_TEMP/proxy.err"; exit 1
        fi
        export OCR_LLM_URL

        # Set the raw facts the DSL routes on for the NEXT review pass.
        #   $1 = prev tier (cheap|strong), $2 = prev pass found a fix-first (true|false)
        set_facts() {
          printf '{"x-cr-prev-tier":"%s","x-cr-prev-p0p1":"%s"}' "$1" "$2" > "$FACTS_FILE"
        }

        # Run OCR once and fail closed on an unusable/partial result. The router
        # alias + injected facts pick the model. The severity-tag mandate rides on
        # --background (additive) rather than --rule: --rule is the highest-priority
        # layer and would REPLACE OCR's built-in language/security rules wholesale,
        # gutting the bug-finding we advertise. --background layers on top of those.
        #   $1 = log label, $2 = prev tier fact, $3 = prev fix-first fact
        run_review() {
          set_facts "$2" "$3"
          echo "::group::Review — $1"
          rc=0
          ocr review --from "$BASE" --to "$HEAD" \
            --background "$(cat "$INSTRUCTION")" --format json \
            > "$RESULT" 2> "$REVIEW_LOG" || rc=$?
          cat "$REVIEW_LOG"
          echo "::endgroup::"
          if ! node "$CHECK" "$RESULT" "$rc"; then
            echo "::error::$BRAND: review engine produced no usable result — failing closed."
            exit 1
          fi
        }

        # Single-run cascade. A promoted PR (tier 1) injects prev-tier=strong, so
        # the DSL's `promoted` rule keeps it on strong. A tier-0 PR injects the
        # cheap-tier facts first; if that pass is clear of FIX_FIRST (P0/P1) we
        # escalate IN THIS SAME RUN by injecting prev-tier=cheap/prev-p0p1=false
        # (the DSL's `escalate` rule -> strong) — so the strong tier always reviews
        # before the PR can merge — and record the promotion so later pushes skip
        # the cheap pass. If the cheap tier still finds FIX_FIRST, hold the strong
        # tier until those are fixed.
        # Each tier's result is snapshotted and its outcome written to
        # $GITHUB_OUTPUT AS SOON as it is known (outputs written before a later
        # failure still surface), so the per-tier report steps have each tier's
        # own counts: `cheap_gate` (blocked|pass) doubles as "the cheap tier ran
        # to a decision", `strong_ran` marks a completed strong pass.
        PROMOTE=false
        HELD=false
        if [ "$TIER_STATE" = "1" ]; then
          run_review "strong tier (promoted)" "strong" "false"
          cp "$RESULT" "$RESULT_STRONG"
          echo "strong_ran=true" >> "$GITHUB_OUTPUT"
        else
          run_review "cheap tier" "cheap" "true"
          cp "$RESULT" "$RESULT_CHEAP"
          if node "$GATE" "$RESULT" --has "$FIX_FIRST"; then
            echo "Cheap tier found $FIX_FIRST — holding the strong tier until those are fixed."
            echo "cheap_gate=blocked" >> "$GITHUB_OUTPUT"
            HELD=true
          else
            echo "Cheap tier clear of $FIX_FIRST — escalating to the strong tier now."
            echo "cheap_gate=pass" >> "$GITHUB_OUTPUT"
            run_review "strong tier (escalation)" "cheap" "false"
            cp "$RESULT" "$RESULT_STRONG"
            echo "strong_ran=true" >> "$GITHUB_OUTPUT"
            PROMOTE=true
          fi
        fi
        echo "promote=$PROMOTE" >> "$GITHUB_OUTPUT"
        # `held` means the cheap tier withheld the strong review on fix-first
        # findings; the gate must block so the PR can't merge with an unfixed
        # P0/P1 that the strong tier never even saw.
        echo "held=$HELD" >> "$GITHUB_OUTPUT"

    # If a dashboard guardrail/firewall blocked the request, the cascade above
    # failed closed and the normal review comment never runs. Surface the reason
    # on the PR so the block is actionable, not just a red X with a log line.
    # always() so it posts despite the failed cascade; no-op when no block file.
    # The guard condition also keeps a STALE block file from being posted on a
    # skipped run (the cascade's own cleanup never ran on a skip).
    - name: Surface guardrail / firewall block
      if: always() && steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        POLICY_BLOCK: ${{ runner.temp }}/policy-block.json
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          let block;
          try {
            block = JSON.parse(fs.readFileSync(process.env.POLICY_BLOCK, 'utf8'));
          } catch {
            return; // no guardrail/firewall block this run
          }
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          const layer = block.kind === 'firewall' ? 'firewall' : 'guardrail';
          const policyLine = block.policyName
            ? `\n\n**Policy:** \`${String(block.policyName).slice(0, 120)}\``
            : '';
          const detail = block.detail ? String(block.detail).slice(0, 300) : '';
          const matchedLine = detail ? `\n\n**Matched:** ${detail}` : '';
          const idTag = block.requestId
            ? ` · request id \`${String(block.requestId).slice(0, 80)}\``
            : '';
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.${idTag}</sub>`;
          const body =
            `## 🐳 ${brand}\n\n` +
            `🛡️ **Review blocked by a ${layer} policy.**` +
            policyLine +
            matchedLine +
            `\n\nOrcaRouter's ${layer} matched this PR against a configured policy and ` +
            `stopped the request **before it reached the model** — the flagged content was ` +
            `never sent to the LLM provider. Because the diff wasn't reviewed, the merge is blocked.` +
            `\n\n**What to do**\n` +
            `- Remove or fix the flagged content (commonly a secret, credential, or other restricted text in the diff).\n` +
            `- Keep secrets out of the repo — use GitHub Actions secrets or a secrets manager, referenced at deploy time.\n` +
            `- If a real secret was exposed, rotate it now.\n` +
            `- Push the fix and the review will re-run automatically.` +
            footer;
          await github.rest.issues.createComment({ ...repo, issue_number: num, body });

    - name: Promote tier
      if: steps.cascade.outputs.promote == 'true'
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          const name = 'orca-review:strong';

          // The documented setup does not create this label, and addLabels only
          // attaches labels that already exist — so ensure it exists first,
          // otherwise the very first promotion would fail instead of recording.
          try {
            await github.rest.issues.getLabel({ ...repo, name });
          } catch (e) {
            if (e.status !== 404) throw e;
            try {
              await github.rest.issues.createLabel({
                ...repo, name, color: '0e8a16',
                description: 'OrcaRouter Code Review: promoted to the strong model tier',
              });
              core.info(`Created repository label ${name}.`);
            } catch (e2) {
              // A parallel first promotion may have created it between our
              // getLabel and createLabel — 422 "already_exists" is fine.
              if (e2.status !== 422) throw e2;
              core.info(`Label ${name} was created concurrently — continuing.`);
            }
          }

          await github.rest.issues.addLabels({ ...repo, issue_number: num, labels: [name] });
          core.info(`PR #${num} promoted to review tier 1 (strong model).`);

    - name: Post review comments
      if: steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        BRAND: ${{ inputs.brand }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        RESULT: ${{ runner.temp }}/result.json
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const brand = process.env.BRAND;
          const num = Number(process.env.PR_NUMBER);
          const sha = process.env.HEAD_SHA;
          const repo = { owner: context.repo.owner, repo: context.repo.repo };

          let result = { comments: [] };
          try {
            result = JSON.parse(fs.readFileSync(process.env.RESULT, 'utf8'));
          } catch (e) {
            console.log('Could not parse result.json:', e.message);
          }
          const comments = result.comments || [];
          // OrcaRouter design: 🐳 header, colored severity dots, brand tagline.
          const SEV = { P0: '🔴', P1: '🟠', P2: '🟡' };
          // Attribution for the Apache-2.0 engine lives in NOTICE + README, not
          // in every comment — OCR is consumed as a package, not redistributed.
          const footer =
            `\n\n<sub>Reviewed via [OrcaRouter](https://orcarouter.ai) — ` +
            `Route Smarter. Ship Safer. Spend Less.</sub>`;

          if (comments.length === 0) {
            // Clean run: no separate notice — the upserted summary comment
            // (next step) already reports the clean state without adding a
            // new timeline entry on every push.
            return;
          }

          // Severity from the LEADING [P0]/[P1]/[P2] tag only (mirrors gate.mjs);
          // a later mention must not override the missing-tag P1 fail-safe.
          const tagRe = /^\s*\[(P[012])\]\s*/i;
          const sevOf = (c) => {
            const m = String(c.content || '').match(tagRe);
            return m ? m[1].toUpperCase() : 'P1';
          };
          // Display form (Codex-style): a colored severity badge, then a bold
          // subtitle + prose ONLY when we can split cleanly; otherwise the finding
          // stays whole. OCR emits a single `[Px] <prose>` string with no title
          // field, and a forced split reads worse than no split (mid-phrase breaks,
          // lowercase fragments). So we split on just two reliable signals: a
          // model-written **bold** lead, or a short first sentence (which keeps the
          // body starting on a fresh, capitalized sentence). Anything else: whole.
          const decorate = (c) => {
            const text = String(c.content || '');
            const m = text.match(tagRe);
            const sev = m ? m[1].toUpperCase() : 'P1';
            const badge = `${SEV[sev]} **${sev}**`;
            const raw = (m ? text.slice(m[0].length) : text).trim();
            const mk = (t) => t.replace(/\*\*/g, '').replace(/[.!?]+$/, '').trim();
            // 1) The model sometimes writes its own **bold** lead — use it verbatim.
            const lead = raw.match(/^\*\*(.+?)\*\*\s+([\s\S]+)$/);
            if (lead) {
              return `${badge} **${mk(lead[1])}**\n\n${lead[2].replace(/\*\*/g, '').trim()}`;
            }
            // 2) Else split only when the first sentence is short enough to title.
            const rest = raw.replace(/\*\*/g, '');
            const end = rest.search(/(?<=[.!?])\s/);
            if (end > 0 && end <= 72) {
              return `${badge} **${mk(rest.slice(0, end))}**\n\n${rest.slice(end).trim()}`;
            }
            // 3) Hard to separate cleanly — keep the finding whole.
            return `${badge} ${rest}`;
          };
          const counts = {};
          for (const c of comments) counts[sevOf(c)] = (counts[sevOf(c)] || 0) + 1;
          const breakdown = ['P0', 'P1', 'P2']
            .filter((s) => counts[s])
            .map((s) => `${SEV[s]} ${counts[s]} ${s}`)
            .join(' · ');
          const n = comments.length;
          const summary =
            `## 🐳 ${brand}\n\n` +
            `Found **${n}** issue${n === 1 ? '' : 's'} in this PR: ${breakdown}.`;

          const inline = [];
          const rest = [];
          for (const c of comments) {
            const line =
              c.end_line >= 1 ? c.end_line : c.start_line >= 1 ? c.start_line : 0;
            if (line >= 1 && c.path) {
              inline.push({ path: c.path, line, side: 'RIGHT', body: decorate(c) });
            } else {
              rest.push(c);
            }
          }
          let body = summary;
          for (const c of rest) body += `\n\n---\n\`${c.path}\`: ${decorate(c)}`;

          try {
            await github.rest.pulls.createReview({
              ...repo, pull_number: num, commit_id: sha,
              body: body + footer, event: 'COMMENT',
              comments: inline,
            });
          } catch (e) {
            console.log('Inline review failed, posting findings as a comment:', e.message);
            // The inline batch carries the actual findings; if GitHub rejects it
            // (uncommentable line, batch too large) append them as text so users
            // still see the details instead of bare counts.
            let fallback = body;
            for (const c of inline) {
              fallback += `\n\n---\n\`${c.path}\` (line ${c.line}): ${c.body}`;
            }
            await github.rest.issues.createComment({ ...repo, issue_number: num, body: fallback + footer });
          }

    # ONE summary comment per PR, upserted by marker and edited in place on
    # every push: severity counts with Δ vs the previous push (state travels
    # in an HTML comment inside the body), the tier, and the gate verdict.
    # Runs BEFORE the enforce step so a blocked run still updates the summary.
    - name: Summary comment (upsert)
      if: steps.guard.outputs.decision != 'skip'
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        RESULT: ${{ runner.temp }}/result.json
        PREV_BODY: ${{ runner.temp }}/prev-summary.md
        SUMMARY_SCRIPT: ${{ github.action_path }}/scripts/summary-comment.mjs
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        BLOCK_ON: ${{ inputs.block-on }}
        HELD: ${{ steps.cascade.outputs.held }}
        STRONG_RAN: ${{ steps.cascade.outputs.strong_ran }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const num = Number(process.env.PR_NUMBER);
          const repo = { owner: context.repo.owner, repo: context.repo.repo };
          // Keep in sync with scripts/summary-comment.mjs.
          const MARKER = '<!-- orca-code-review-summary -->';

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...repo, issue_number: num, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));

          // Feed the previous body back for the Δ column and number this push
          // from its machine state (first summary = push 1).
          const args = [process.env.SUMMARY_SCRIPT, process.env.RESULT];
          let push = 1;
          if (existing) {
            fs.writeFileSync(process.env.PREV_BODY, existing.body);
            args.push('--prev', process.env.PREV_BODY);
            const m = existing.body.match(/<!-- orca-cr-state: (\{.*?\}) -->/);
            if (m) {
              try { push = (Number(JSON.parse(m[1]).push) || 0) + 1; } catch { /* keep 1 */ }
            }
          }

          // Mirror the enforce step's verdict: held blocks; otherwise gate.mjs
          // on the final result (exit 0 = a BLOCK_ON severity is present).
          let blocked = process.env.HELD === 'true';
          if (!blocked) {
            try {
              execFileSync('node', [process.env.GATE, process.env.RESULT, '--has', process.env.BLOCK_ON], { stdio: 'pipe' });
              blocked = true;
            } catch { blocked = false; }
          }
          const tier = process.env.STRONG_RAN === 'true' ? 'strong' : 'cheap';
          args.push('--tier', tier, '--push', String(push), '--gate', blocked ? 'blocked' : 'pass');

          const body = execFileSync('node', args, { encoding: 'utf8' });
          if (existing) {
            await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ ...repo, issue_number: num, body });
          }

    - name: Enforce severity gate
      if: steps.guard.outputs.decision != 'skip'
      shell: bash
      env:
        BRAND: ${{ inputs.brand }}
        BLOCK_ON: ${{ inputs.block-on }}
        FIX_FIRST: ${{ inputs.fix-first }}
        HELD: ${{ steps.cascade.outputs.held }}
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        RESULT: ${{ runner.temp }}/result.json
      run: |
        if [ "$HELD" = "true" ]; then
          echo "::error::$BRAND: cheap tier found $FIX_FIRST finding(s) to fix before the strong-tier review runs — blocking."
          exit 1
        fi
        if node "$GATE" "$RESULT" --has "$BLOCK_ON"; then
          echo "::error::$BRAND: blocking — found $BLOCK_ON severity finding(s)."
          exit 1
        fi
        echo "$BRAND: no $BLOCK_ON findings — gate passed."

    # Best-effort run counters to the OrcaRouter control plane — severity
    # counts and the gate verdict only, never code (see README "Run
    # reporting"). One step per tier that ran, AFTER the gate: always() because
    # a blocked gate fails the job above, and blocked runs must report too.
    # report.mjs itself exits 0 on any error, so these steps can't fail the job.
    - name: Report run (cheap tier)
      # `cheap_gate` doubles as "the cheap tier ran to a gate decision".
      if: always() && inputs.report == 'true' && steps.cascade.outputs.cheap_gate != ''
      shell: bash
      env:
        REPORT: ${{ github.action_path }}/scripts/report.mjs
        RESULT_CHEAP: ${{ runner.temp }}/result-cheap.json
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        CHEAP_GATE: ${{ steps.cascade.outputs.cheap_gate }}
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        ORCAROUTER_API_KEY: ${{ inputs.orcarouter-api-key }}
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: |
        node "$REPORT" "$RESULT_CHEAP" \
          --repo "$REPO" --pr "$PR_NUMBER" --sha "$HEAD_SHA" \
          --tier cheap --gate "$CHEAP_GATE" \
          --url "$ORCAROUTER_URL" --key "$ORCAROUTER_API_KEY" \
          --engine-version "$ENGINE_VERSION"

    - name: Report run (strong tier)
      if: always() && inputs.report == 'true' && steps.cascade.outputs.strong_ran == 'true'
      shell: bash
      env:
        REPORT: ${{ github.action_path }}/scripts/report.mjs
        GATE: ${{ github.action_path }}/scripts/gate.mjs
        RESULT_STRONG: ${{ runner.temp }}/result-strong.json
        BLOCK_ON: ${{ inputs.block-on }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        ORCAROUTER_URL: ${{ inputs.orcarouter-url }}
        ORCAROUTER_API_KEY: ${{ inputs.orcarouter-api-key }}
        ENGINE_VERSION: ${{ inputs.engine-version }}
      run: |
        # The strong tier's verdict re-uses gate.mjs on its snapshot
        # (exit 0 = a BLOCK_ON severity is present = blocked).
        GATE_RESULT=pass
        if node "$GATE" "$RESULT_STRONG" --has "$BLOCK_ON"; then GATE_RESULT=blocked; fi
        node "$REPORT" "$RESULT_STRONG" \
          --repo "$REPO" --pr "$PR_NUMBER" --sha "$HEAD_SHA" \
          --tier strong --gate "$GATE_RESULT" \
          --url "$ORCAROUTER_URL" --key "$ORCAROUTER_API_KEY" \
          --engine-version "$ENGINE_VERSION"

    - name: Clean up engine output
      if: always()
      shell: bash
      run: |
        # Remove only the files THIS run created in $RUNNER_TEMP so review output
        # doesn't linger across jobs on a self-hosted runner. We deliberately do
        # not touch ~/.opencodereview: we never write the shared config (all OCR
        # settings come from env vars), and deleting it would corrupt the OCR
        # state of other jobs/users on the same runner.
        rm -f "$RUNNER_TEMP/result.json" "$RUNNER_TEMP/review.log" \
          "$RUNNER_TEMP/result-cheap.json" "$RUNNER_TEMP/result-strong.json" \
          "$RUNNER_TEMP/cr-facts.json" "$RUNNER_TEMP/proxy.out" "$RUNNER_TEMP/proxy.err" \
          "$RUNNER_TEMP/policy-block.json" \
          "$RUNNER_TEMP/pr.diff" "$RUNNER_TEMP/diff-guard.json" "$RUNNER_TEMP/prev-summary.md"
